name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build app image
        run: |
          mvn versions:set "-DnewVersion=${{ inputs.version }}" versions:commit
          mvn clean verify -P installer "-Dapp.version=${{ inputs.version }}"

      - name: Zip app image
        run: Compress-Archive -Path target/installer/CopilotToolOutputViewer -DestinationPath target/installer/CopilotToolOutputViewer-${{ inputs.version }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: CopilotToolOutputViewer v${{ inputs.version }}
          generate_release_notes: true
          files: target/installer/CopilotToolOutputViewer-${{ inputs.version }}.zip
